spring.datasource.url=jdbc:postgresql://localhost:5432/budgeter
spring.datasource.username=budgeter
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File uploads (import endpoints accept CSV/XLSX exports)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Market price sync (see docs/MARKET_SYNC_PLAN.md). Disabled by default: no external
# calls from tests/CI. Enable and provide the API key via environment in production.
pricesync.enabled=${PRICESYNC_ENABLED:false}
pricesync.api-key=${PRICESYNC_API_KEY:}
pricesync.base-url=${PRICESYNC_BASE_URL:https://api.twelvedata.com}
pricesync.fx-base-url=${PRICESYNC_FX_BASE_URL:https://api.frankfurter.app}
pricesync.cron=${PRICESYNC_CRON:0 30 5 * * *}
pricesync.timezone=Europe/Berlin
pricesync.backfill-start=${PRICESYNC_BACKFILL_START:2021-01-01}
# Free tier allows 8 requests/minute; delay between symbol fetches during backfill
pricesync.request-delay-ms=${PRICESYNC_REQUEST_DELAY_MS:7600}

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.info.env.enabled=true
